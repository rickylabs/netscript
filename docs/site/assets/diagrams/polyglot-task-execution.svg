<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" role="img"
     aria-label="Polyglot task execution: worker runtime invokes a TS task handler which spawns a subprocess (deno, python, dotnet, shell, and other adapters); the handler passes argv plus env vars into the subprocess, and the subprocess returns a JSON object parsed from the last line of stdout; the result returns to the handler which writes to the queue or database"
     font-family="DM Sans, Segoe UI, system-ui, sans-serif">
  <!-- Theme-neutral: transparent background, mid-tone (#888) strokes + text that read
       on both light and dark. Committed static SVG (OD1) — no client-side Mermaid. -->
  <defs>
    <marker id="ns-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7"
            markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888888" />
    </marker>
  </defs>
  <text x="360" y="22" fill="#888888" font-size="13" text-anchor="middle"
        font-weight="600">Polyglot task execution</text>

  <!-- subprocess boundary (dashed box) -->
  <rect x="288" y="96" width="184" height="120" rx="8" fill="none"
        stroke="#888888" stroke-width="1.3" stroke-dasharray="5 4" opacity="0.8" />
  <text x="380" y="112" fill="#888888" font-size="10.5" text-anchor="middle"
        opacity="0.8">subprocess</text>

  <!-- main row nodes -->
  <g fill="none" stroke="#888888" stroke-width="1.5">
    <rect x="24"  y="126" width="120" height="52" rx="6" />
    <rect x="156" y="126" width="108" height="52" rx="6" />
    <rect x="304" y="130" width="152" height="58" rx="6" />
    <rect x="552" y="126" width="144" height="52" rx="6" />
    <!-- worker -> handler -->
    <line x1="144" y1="152" x2="152" y2="152" marker-end="url(#ns-arrow)" />
    <!-- handler -> subprocess (spawn, argv + env vars inbound) -->
    <line x1="264" y1="146" x2="300" y2="146" marker-end="url(#ns-arrow)" />
    <!-- subprocess -> handler (last stdout line -> JSON object) -->
    <line x1="300" y1="166" x2="266" y2="166" marker-end="url(#ns-arrow)" />
    <!-- handler -> queue/db -->
    <line x1="264" y1="196" x2="552" y2="160" marker-end="url(#ns-arrow)" />
  </g>

  <!-- node labels -->
  <g fill="#888888" font-size="12.5" text-anchor="middle">
    <text x="84"  y="148">Worker runtime</text>
    <text x="210" y="148">TS handler</text>
    <text x="380" y="150">deno / python / dotnet</text>
    <text x="624" y="148">Queue / DB</text>
  </g>
  <g fill="#888888" font-size="10.5" text-anchor="middle" opacity="0.85">
    <text x="84"  y="165">enqueues task</text>
    <text x="210" y="165">task handler</text>
    <text x="380" y="167">cmd / powershell / shell / exe</text>
    <text x="624" y="165">persist result</text>
  </g>

  <!-- spawn + IPC + flow annotations -->
  <text x="282" y="140" fill="#888888" font-size="9.5" text-anchor="middle"
        opacity="0.9">spawn</text>
  <text x="380" y="206" fill="#888888" font-size="10.5" text-anchor="middle"
        opacity="0.85">spawned process</text>
  <text x="360" y="240" fill="#888888" font-size="10.5" text-anchor="middle"
        opacity="0.9">in: argv + env vars</text>
  <text x="360" y="256" fill="#888888" font-size="10.5" text-anchor="middle"
        opacity="0.9">out: last stdout line &rarr; JSON object</text>
  <text x="360" y="278" fill="#888888" font-size="9.5" text-anchor="middle"
        opacity="0.8">TRACEPARENT / CORRELATION_ID injected via env</text>
</svg>
