<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 250" role="img"
     aria-label="Runtime config resolution: two separate packages with two precedence rules. The config package owns project and build-time typed schema config via defineConfig and loadConfig, resolving schema defaults then config values then env readers. The runtime-config package owns a hot-reloadable operational override layer via loadRuntimeConfig and watchRuntimeConfig, applying and watching overrides at runtime. The two layers are separate and are not merged into a single frozen config."
     font-family="DM Sans, Segoe UI, system-ui, sans-serif">
  <!-- Theme-neutral: transparent background, mid-tone (#888) strokes + text that read
       on both light and dark. Committed static SVG (OD1) — no client-side Mermaid. -->
  <defs>
    <marker id="ns-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7"
            markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888888" />
    </marker>
  </defs>
  <text x="360" y="22" fill="#888888" font-size="13" text-anchor="middle"
        font-weight="600">Runtime config resolution</text>
  <text x="360" y="40" fill="#888888" font-size="10.5" text-anchor="middle"
        opacity="0.85">two packages, two precedence rules &mdash; separate layers, no single frozen merge</text>

  <!-- ===== Lane 1: @netscript/config (build-time typed schema config) ===== -->
  <rect x="12" y="58" width="696" height="76" rx="8" fill="none"
        stroke="#888888" stroke-width="1.3" stroke-dasharray="5 4" opacity="0.7" />
  <text x="24" y="74" fill="#888888" font-size="10.5" text-anchor="start"
        opacity="0.85">@netscript/config &middot; defineConfig / loadConfig &mdash; build-time typed schema</text>

  <g fill="none" stroke="#888888" stroke-width="1.5">
    <rect x="40"  y="84" width="150" height="40" rx="6" />
    <rect x="285" y="84" width="150" height="40" rx="6" />
    <rect x="530" y="84" width="150" height="40" rx="6" />
    <line x1="190" y1="104" x2="281" y2="104" marker-end="url(#ns-arrow)" />
    <line x1="435" y1="104" x2="526" y2="104" marker-end="url(#ns-arrow)" />
  </g>
  <g fill="#888888" font-size="11.5" text-anchor="middle">
    <text x="115" y="102">Schema defaults</text>
    <text x="360" y="102">Config values</text>
    <text x="605" y="102">Env readers</text>
  </g>
  <g fill="#888888" font-size="9.5" text-anchor="middle" opacity="0.85">
    <text x="115" y="116">typed schema</text>
    <text x="360" y="116">defineConfig values</text>
    <text x="605" y="116">env readers</text>
  </g>

  <!-- ===== Lane 2: @netscript/runtime-config (operational override layer) ===== -->
  <rect x="12" y="150" width="696" height="76" rx="8" fill="none"
        stroke="#888888" stroke-width="1.3" stroke-dasharray="5 4" opacity="0.7" />
  <text x="24" y="166" fill="#888888" font-size="10.5" text-anchor="start"
        opacity="0.85">@netscript/runtime-config &middot; loadRuntimeConfig / watchRuntimeConfig &mdash; hot-reloadable operational overrides</text>

  <g fill="none" stroke="#888888" stroke-width="1.5">
    <rect x="40"  y="176" width="195" height="40" rx="6" />
    <rect x="485" y="176" width="195" height="40" rx="6" />
    <line x1="235" y1="196" x2="481" y2="196" marker-end="url(#ns-arrow)" />
  </g>
  <g fill="#888888" font-size="11.5" text-anchor="middle">
    <text x="137" y="194">loadRuntimeConfig</text>
    <text x="582" y="194">watchRuntimeConfig</text>
  </g>
  <g fill="#888888" font-size="9.5" text-anchor="middle" opacity="0.85">
    <text x="137" y="208">overrides applied at runtime</text>
    <text x="582" y="208">overrides watched / hot-reloaded</text>
  </g>
</svg>
