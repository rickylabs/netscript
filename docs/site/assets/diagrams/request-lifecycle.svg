<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 140" role="img"
     aria-label="Request lifecycle: contract to handler to typed client to UI island"
     font-family="DM Sans, Segoe UI, system-ui, sans-serif">
  <!-- Theme-neutral: transparent background, mid-tone (#888) strokes + text that
       read on both light and dark. Hand-authored sample proving the comp.diagram
       committed-SVG pipeline (S01 / OD1). Replace via the _diagrams render step. -->
  <defs>
    <marker id="ns-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7"
            markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888888" />
    </marker>
  </defs>
  <g fill="none" stroke="#888888" stroke-width="1.5">
    <rect x="12"  y="46" width="132" height="48" rx="6" />
    <rect x="204" y="46" width="132" height="48" rx="6" />
    <rect x="396" y="46" width="132" height="48" rx="6" />
    <rect x="588" y="46" width="120" height="48" rx="6" />
    <line x1="144" y1="70" x2="200" y2="70" marker-end="url(#ns-arrow)" />
    <line x1="336" y1="70" x2="392" y2="70" marker-end="url(#ns-arrow)" />
    <line x1="528" y1="70" x2="584" y2="70" marker-end="url(#ns-arrow)" />
  </g>
  <g fill="#888888" font-size="14" text-anchor="middle">
    <text x="78"  y="66">Contract</text>
    <text x="270" y="66">Handler</text>
    <text x="462" y="66">Typed client</text>
    <text x="648" y="66">UI island</text>
  </g>
  <g fill="#888888" font-size="11" text-anchor="middle" opacity="0.85">
    <text x="78"  y="84">oRPC schema</text>
    <text x="270" y="84">service</text>
    <text x="462" y="84">@netscript/sdk</text>
    <text x="648" y="84">Fresh</text>
  </g>
  <text x="360" y="22" fill="#888888" font-size="13" text-anchor="middle"
        font-weight="600">Request lifecycle</text>
</svg>
