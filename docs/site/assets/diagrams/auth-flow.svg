<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" role="img"
     aria-label="Auth flow: client to auth oRPC service to adapter selector to identity provider, with the issued Principal returning into a downstream withAuthn and withAuthz guard"
     font-family="DM Sans, Segoe UI, system-ui, sans-serif">
  <title>Auth request flow</title>
  <desc>A browser or client calls the plugins/auth oRPC service, which selects a backend
        adapter (WorkOS, Better-Auth, or KV-OAuth) that talks to an identity provider. The
        issued session Principal flows back to the client and into a downstream service guarded
        by withAuthn and withAuthz.</desc>
  <defs>
    <marker id="ns-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7"
            markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888888" />
    </marker>
  </defs>
  <text x="380" y="24" fill="#888888" font-size="13" text-anchor="middle"
        font-weight="600">Auth request flow</text>
  <g fill="none" stroke="#888888" stroke-width="1.5">
    <rect x="20"  y="56" width="128" height="48" rx="6" />
    <rect x="208" y="56" width="148" height="48" rx="6" />
    <rect x="416" y="56" width="156" height="48" rx="6" />
    <rect x="632" y="56" width="108" height="48" rx="6" />
    <line x1="148" y1="80" x2="204" y2="80" marker-end="url(#ns-arrow)" />
    <line x1="356" y1="80" x2="412" y2="80" marker-end="url(#ns-arrow)" />
    <line x1="572" y1="80" x2="628" y2="80" marker-end="url(#ns-arrow)" />
  </g>
  <g fill="#888888" font-size="14" text-anchor="middle">
    <text x="84"  y="76">Client</text>
    <text x="282" y="76">Auth service</text>
    <text x="494" y="76">Adapter selector</text>
    <text x="686" y="76">Identity provider</text>
  </g>
  <g fill="#888888" font-size="11" text-anchor="middle" opacity="0.85">
    <text x="84"  y="94">browser / SDK</text>
    <text x="282" y="94">plugins/auth oRPC</text>
    <text x="494" y="94">backend select</text>
    <text x="686" y="94">OIDC / OAuth</text>
  </g>
  <g fill="none" stroke="#888888" stroke-width="1.3">
    <rect x="416" y="132" width="156" height="34" rx="6" />
    <rect x="416" y="172" width="156" height="34" rx="6" />
    <rect x="416" y="212" width="156" height="34" rx="6" />
    <line x1="494" y1="104" x2="494" y2="128" marker-end="url(#ns-arrow)" />
  </g>
  <g fill="#888888" font-size="11.5" text-anchor="middle">
    <text x="494" y="153">WorkOS</text>
    <text x="494" y="193">Better-Auth</text>
    <text x="494" y="233">KV-OAuth</text>
  </g>
  <text x="494" y="120" fill="#888888" font-size="10.5" text-anchor="middle"
        opacity="0.8">one adapter wins</text>
  <g fill="none" stroke="#888888" stroke-width="1.5" stroke-dasharray="5 4">
    <path d="M 282 104 L 282 268 L 84 268 L 84 232" marker-end="url(#ns-arrow)" />
  </g>
  <text x="200" y="262" fill="#888888" font-size="11" text-anchor="middle"
        opacity="0.85">issued session / Principal</text>
  <g fill="none" stroke="#888888" stroke-width="1.5">
    <rect x="20" y="184" width="128" height="48" rx="6" />
  </g>
  <g fill="#888888" font-size="13" text-anchor="middle">
    <text x="84" y="204">Downstream</text>
    <text x="84" y="221" font-size="11" opacity="0.85">withAuthn / withAuthz</text>
  </g>
</svg>
