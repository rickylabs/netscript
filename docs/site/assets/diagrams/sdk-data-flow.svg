<svg id="my-svg" width="100%" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" style="max-width: 1066.12px; background-color: transparent;" viewBox="-8 -8 1066.125 168" role="graphics-document document" aria-roledescription="flowchart-v2"><style>#my-svg{font-family:DM Sans,Segoe UI,system-ui,-apple-system,sans-serif;font-size:15px;fill:#fcfaf6;}#my-svg .error-icon{fill:#12100e;}#my-svg .error-text{fill:#fcfaf6;stroke:#fcfaf6;}#my-svg .edge-thickness-normal{stroke-width:2px;}#my-svg .edge-thickness-thick{stroke-width:3.5px;}#my-svg .edge-pattern-solid{stroke-dasharray:0;}#my-svg .edge-pattern-dashed{stroke-dasharray:3;}#my-svg .edge-pattern-dotted{stroke-dasharray:2;}#my-svg .marker{fill:#bd774c;stroke:#bd774c;}#my-svg .marker.cross{stroke:#bd774c;}#my-svg svg{font-family:DM Sans,Segoe UI,system-ui,-apple-system,sans-serif;font-size:15px;}#my-svg .label{font-family:DM Sans,Segoe UI,system-ui,-apple-system,sans-serif;color:#fcfaf6;}#my-svg .cluster-label text{fill:#fcfaf6;}#my-svg .cluster-label span,#my-svg p{color:#fcfaf6;}#my-svg .label text,#my-svg span,#my-svg p{fill:#fcfaf6;color:#fcfaf6;}#my-svg .node rect,#my-svg .node circle,#my-svg .node ellipse,#my-svg .node polygon,#my-svg .node path{fill:#1b1916;stroke:#bd774c;stroke-width:1px;}#my-svg .flowchart-label text{text-anchor:middle;}#my-svg .node .katex path{fill:#000;stroke:#000;stroke-width:1px;}#my-svg .node .label{text-align:center;}#my-svg .node.clickable{cursor:pointer;}#my-svg .arrowheadPath{fill:rgba(255, 255, 255, 0);}#my-svg .edgePath .path{stroke:#bd774c;stroke-width:2.0px;}#my-svg .flowchart-link{stroke:#bd774c;fill:none;}#my-svg .edgeLabel{background-color:#090806;text-align:center;}#my-svg .edgeLabel rect{opacity:0.5;background-color:#090806;fill:#090806;}#my-svg .labelBkg{background-color:rgba(9, 8, 6, 0.5);}#my-svg .cluster rect{fill:#12100e;stroke:#5c5b57;stroke-width:1px;}#my-svg .cluster text{fill:#fcfaf6;}#my-svg .cluster span,#my-svg p{color:#fcfaf6;}#my-svg div