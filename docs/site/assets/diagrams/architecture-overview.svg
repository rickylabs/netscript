<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 320" role="img"
     aria-label="NetScript layered architecture: app layer on top, plugin layer in the middle, framework runtime and database adapters at the base, with Aspire orchestration spanning the side"
     font-family="DM Sans, Segoe UI, system-ui, sans-serif">
  <title>NetScript layered architecture</title>
  <desc>The app layer (Fresh UI and SDK) sits on top of the plugin layer (services, workers,
        sagas, triggers, streams, auth), which sits on the framework base (packages, runtime,
        database adapters). Aspire orchestration spans the full stack along the side.</desc>
  <defs>
    <marker id="ns-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7"
            markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888888" />
    </marker>
  </defs>
  <text x="380" y="24" fill="#888888" font-size="13" text-anchor="middle"
        font-weight="600">NetScript layered architecture</text>
  <!-- App layer -->
  <g fill="none" stroke="#888888" stroke-width="1.6">
    <rect x="40" y="48" width="560" height="58" rx="8" />
    <rect x="60" y="62" width="250" height="30" rx="5" />
    <rect x="330" y="62" width="250" height="30" rx="5" />
  </g>
  <text x="320" y="44" fill="#888888" font-size="11" text-anchor="middle"
        opacity="0.85">App layer</text>
  <g fill="#888888" font-size="12" text-anchor="middle">
    <text x="185" y="82">Fresh UI</text>
    <text x="455" y="82">SDK</text>
  </g>
  <!-- Plugin layer -->
  <g fill="none" stroke="#888888" stroke-width="1.6">
    <rect x="40" y="124" width="560" height="58" rx="8" />
  </g>
  <text x="320" y="120" fill="#888888" font-size="11" text-anchor="middle"
        opacity="0.85">Plugin layer</text>
  <g fill="none" stroke="#888888" stroke-width="1.3">
    <rect x="56"  y="138" width="80" height="30" rx="5" />
    <rect x="146" y="138" width="80" height="30" rx="5" />
    <rect x="236" y="138" width="80" height="30" rx="5" />
    <rect x="326" y="138" width="80" height="30" rx="5" />
    <rect x="416" y="138" width="80" height="30" rx="5" />
    <rect x="506" y="138" width="78" height="30" rx="5" />
  </g>
  <g fill="#888888" font-size="11" text-anchor="middle">
    <text x="96"  y="157">services</text>
    <text x="186" y="157">workers</text>
    <text x="276" y="157">sagas</text>
    <text x="366" y="157">triggers</text>
    <text x="456" y="157">streams</text>
    <text x="545" y="157">auth</text>
  </g>
  <!-- Framework base -->
  <g fill="none" stroke="#888888" stroke-width="1.6">
    <rect x="40" y="200" width="560" height="58" rx="8" />
    <rect x="56"  y="214" width="168" height="30" rx="5" />
    <rect x="232" y="214" width="168" height="30" rx="5" />
    <rect x="408" y="214" width="176" height="30" rx="5" />
  </g>
  <text x="320" y="196" fill="#888888" font-size="11" text-anchor="middle"
        opacity="0.85">Framework base</text>
  <g fill="#888888" font-size="11" text-anchor="middle">
    <text x="140" y="233">packages</text>
    <text x="316" y="233">runtime</text>
    <text x="496" y="233">database adapters</text>
  </g>
  <!-- layering arrows -->
  <g fill="none" stroke="#888888" stroke-width="1.4">
    <line x1="320" y1="106" x2="320" y2="122" marker-end="url(#ns-arrow)" />
    <line x1="320" y1="182" x2="320" y2="198" marker-end="url(#ns-arrow)" />
  </g>
  <!-- Aspire orchestration spanning the side -->
  <g fill="none" stroke="#888888" stroke-width="1.6">
    <rect x="624" y="48" width="96" height="210" rx="8" />
  </g>
  <g fill="#888888" font-size="12.5" text-anchor="middle">
    <text x="672" y="146">Aspire</text>
    <text x="672" y="165" font-size="10.5" opacity="0.85">orchestration</text>
  </g>
  <g fill="none" stroke="#888888" stroke-width="1.3" stroke-dasharray="4 4">
    <line x1="624" y1="77"  x2="604" y2="77" />
    <line x1="624" y1="153" x2="604" y2="153" />
    <line x1="624" y1="229" x2="604" y2="229" />
  </g>
</svg>
