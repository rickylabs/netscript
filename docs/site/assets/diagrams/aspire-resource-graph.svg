<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 460" role="img"
     aria-label="Aspire AppHost orchestrating a NetScript app resource graph: a Postgres resource and one plugin's HTTP API service plus isolated worker and saga-runner background processors, with connection strings injected from Postgres and an Aspire Dashboard observing every resource"
     font-family="DM Sans, Segoe UI, system-ui, sans-serif">
  <title>Aspire resource graph</title>
  <desc>The Aspire AppHost declares and starts a resource graph. It starts a Postgres
        resource and, for the orders plugin, an HTTP API service plus isolated worker and
        saga-runner background processors as separate resources. Postgres injects connection
        strings / service discovery into each service, and an Aspire Dashboard observes all
        resources for telemetry, logs, and traces.</desc>
  <!-- Theme-neutral: transparent background, mid-tone (#888) strokes + text.
       Source: _diagrams/aspire-resource-graph.mmd -->
  <defs>
    <marker id="ns-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7"
            markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888888" />
    </marker>
  </defs>

  <text x="410" y="26" fill="#888888" font-size="13" text-anchor="middle"
        font-weight="600">Aspire resource graph (local dev)</text>

  <!-- AppHost root -->
  <g fill="none" stroke="#888888" stroke-width="1.6">
    <rect x="300" y="48" width="220" height="56" rx="8" />
  </g>
  <g fill="#888888" text-anchor="middle">
    <text x="410" y="74" font-size="13">Aspire AppHost</text>
    <text x="410" y="92" font-size="10.5" opacity="0.85">declares &amp; starts resource graph</text>
  </g>

  <!-- Resource graph container -->
  <g fill="none" stroke="#888888" stroke-width="1.4" stroke-dasharray="5 3">
    <rect x="40" y="150" width="600" height="270" rx="10" />
  </g>
  <text x="58" y="170" fill="#888888" font-size="11" text-anchor="start"
        opacity="0.85">Resource graph</text>

  <!-- Postgres resource -->
  <g fill="none" stroke="#888888" stroke-width="1.5">
    <rect x="72" y="208" width="150" height="64" rx="6" />
  </g>
  <g fill="#888888" text-anchor="middle">
    <text x="147" y="237" font-size="13">Postgres</text>
    <text x="147" y="255" font-size="10.5" opacity="0.85">resource</text>
  </g>

  <!-- orders plugin sub-container -->
  <g fill="none" stroke="#888888" stroke-width="1.3" stroke-dasharray="4 4">
    <rect x="296" y="186" width="320" height="210" rx="8" />
  </g>
  <text x="312" y="206" fill="#888888" font-size="11" text-anchor="start"
        opacity="0.85">orders plugin</text>

  <!-- HTTP API service -->
  <g fill="none" stroke="#888888" stroke-width="1.5">
    <rect x="320" y="222" width="270" height="46" rx="6" />
  </g>
  <text x="455" y="250" fill="#888888" font-size="12.5" text-anchor="middle">HTTP API service</text>

  <!-- isolated background processors -->
  <g fill="none" stroke="#888888" stroke-width="1.5">
    <rect x="320" y="300" width="128" height="64" rx="6" />
    <rect x="462" y="300" width="128" height="64" rx="6" />
  </g>
  <g fill="#888888" text-anchor="middle">
    <text x="384" y="328" font-size="12.5">worker</text>
    <text x="384" y="346" font-size="10" opacity="0.85">bg processor</text>
    <text x="526" y="328" font-size="12.5">saga-runner</text>
    <text x="526" y="346" font-size="10" opacity="0.85">bg processor</text>
  </g>
  <text x="455" y="384" fill="#888888" font-size="10.5" text-anchor="middle"
        opacity="0.85">isolated background processors (separate resources)</text>

  <!-- AppHost -> resources (starts) -->
  <g fill="none" stroke="#888888" stroke-width="1.4">
    <!-- to Postgres -->
    <path d="M 360 104 C 280 140, 160 165, 147 206" marker-end="url(#ns-arrow)" />
    <!-- to API -->
    <line x1="430" y1="104" x2="448" y2="220" marker-end="url(#ns-arrow)" />
  </g>
  <text x="232" y="150" fill="#888888" font-size="10.5" text-anchor="middle"
        opacity="0.85">starts</text>

  <!-- API -> worker / saga-runner (plugin processors started under the plugin) -->
  <g fill="none" stroke="#888888" stroke-width="1.4">
    <path d="M 410 268 L 388 298" marker-end="url(#ns-arrow)" />
    <path d="M 500 268 L 522 298" marker-end="url(#ns-arrow)" />
  </g>

  <!-- Postgres -> services (connection string / service discovery) -->
  <g fill="none" stroke="#888888" stroke-width="1.4" stroke-dasharray="2 3">
    <path d="M 222 232 L 316 240" marker-end="url(#ns-arrow)" />
    <path d="M 200 272 C 250 320, 300 330, 316 332" marker-end="url(#ns-arrow)" />
    <path d="M 222 258 C 300 360, 420 380, 458 366" marker-end="url(#ns-arrow)" />
  </g>
  <text x="270" y="226" fill="#888888" font-size="10" text-anchor="middle"
        opacity="0.85">connection string /</text>
  <text x="270" y="238" fill="#888888" font-size="10" text-anchor="middle"
        opacity="0.85">service discovery</text>

  <!-- Aspire Dashboard -->
  <g fill="none" stroke="#888888" stroke-width="1.6">
    <rect x="672" y="208" width="120" height="148" rx="8" />
  </g>
  <g fill="#888888" text-anchor="middle">
    <text x="732" y="272" font-size="12.5">Aspire</text>
    <text x="732" y="290" font-size="12.5">Dashboard</text>
    <text x="732" y="310" font-size="10" opacity="0.85">telemetry /</text>
    <text x="732" y="322" font-size="10" opacity="0.85">logs / traces</text>
  </g>

  <!-- Dashboard observes all resources -->
  <g fill="none" stroke="#888888" stroke-width="1.2" stroke-dasharray="3 4">
    <path d="M 672 240 C 640 235, 620 238, 590 240" />
    <path d="M 672 300 C 630 320, 610 332, 590 334" />
    <path d="M 672 330 C 540 400, 240 320, 222 262" />
  </g>
  <text x="732" y="350" fill="#888888" font-size="10" text-anchor="middle"
        opacity="0.85">observes</text>
</svg>
