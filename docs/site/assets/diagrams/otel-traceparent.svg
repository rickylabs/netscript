<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 280" role="img"
     aria-label="Trace context propagation: an inbound traceparent crosses a service span, enqueue, worker span, and saga span under one trace id, exported to an OTLP collector"
     font-family="DM Sans, Segoe UI, system-ui, sans-serif">
  <title>OpenTelemetry traceparent propagation</title>
  <desc>An inbound request carries a traceparent header into a service span. The traceparent is
        propagated across an enqueue boundary into a worker span and a saga span. All spans share
        one trace id and are exported to an OTLP collector.</desc>
  <defs>
    <marker id="ns-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7"
            markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888888" />
    </marker>
  </defs>
  <text x="380" y="24" fill="#888888" font-size="13" text-anchor="middle"
        font-weight="600">Trace context propagation</text>
  <!-- inbound request -->
  <g fill="none" stroke="#888888" stroke-width="1.5">
    <rect x="20" y="86" width="120" height="48" rx="6" />
  </g>
  <g fill="#888888" font-size="12.5" text-anchor="middle">
    <text x="80" y="106">Inbound</text>
    <text x="80" y="123" font-size="10.5" opacity="0.85">traceparent</text>
  </g>
  <!-- one trace id bracket -->
  <g fill="none" stroke="#888888" stroke-width="1.3" stroke-dasharray="4 4">
    <rect x="176" y="70" width="500" height="92" rx="8" />
  </g>
  <text x="426" y="64" fill="#888888" font-size="11" text-anchor="middle"
        opacity="0.85">one trace id</text>
  <!-- spans -->
  <g fill="none" stroke="#888888" stroke-width="1.5">
    <rect x="192" y="92" width="124" height="48" rx="6" />
    <rect x="376" y="92" width="124" height="48" rx="6" />
    <rect x="536" y="92" width="124" height="48" rx="6" />
  </g>
  <g fill="#888888" font-size="12.5" text-anchor="middle">
    <text x="254" y="112">Service span</text>
    <text x="438" y="112">Worker span</text>
    <text x="598" y="112">Saga span</text>
  </g>
  <g fill="#888888" font-size="10" text-anchor="middle" opacity="0.8">
    <text x="254" y="130">handler</text>
    <text x="438" y="130">job</text>
    <text x="598" y="130">step</text>
  </g>
  <!-- inbound to service -->
  <g fill="none" stroke="#888888" stroke-width="1.5">
    <line x1="140" y1="110" x2="188" y2="110" marker-end="url(#ns-arrow)" />
    <line x1="316" y1="116" x2="372" y2="116" marker-end="url(#ns-arrow)" />
    <line x1="500" y1="116" x2="532" y2="116" marker-end="url(#ns-arrow)" />
  </g>
  <text x="344" y="156" fill="#888888" font-size="10" text-anchor="middle"
        opacity="0.8">enqueue (propagated)</text>
  <text x="516" y="156" fill="#888888" font-size="10" text-anchor="middle"
        opacity="0.8">continued</text>
  <!-- OTLP collector -->
  <g fill="none" stroke="#888888" stroke-width="1.5">
    <rect x="296" y="216" width="180" height="44" rx="6" />
  </g>
  <g fill="#888888" font-size="12.5" text-anchor="middle">
    <text x="386" y="243">OTLP collector</text>
  </g>
  <g fill="none" stroke="#888888" stroke-width="1.4" stroke-dasharray="5 4">
    <line x1="254" y1="140" x2="340" y2="212" marker-end="url(#ns-arrow)" />
    <line x1="438" y1="140" x2="438" y2="212" marker-end="url(#ns-arrow)" />
    <line x1="598" y1="140" x2="450" y2="212" marker-end="url(#ns-arrow)" />
  </g>
  <text x="386" y="200" fill="#888888" font-size="10" text-anchor="middle"
        opacity="0.8">export spans</text>
</svg>
