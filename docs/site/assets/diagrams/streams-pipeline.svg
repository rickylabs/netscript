<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 320" role="img"
     aria-label="Durable event streams: producers append to a durable log backed by a durable store, fanning out at-least-once to consumer subscriptions"
     font-family="DM Sans, Segoe UI, system-ui, sans-serif">
  <title>Durable event streams pipeline</title>
  <desc>Producers such as services, sagas, and triggers append events to a durable
        append-only log. The log is backed by a durable store on KV or Prisma, and delivers
        events at-least-once to consumer subscriptions.</desc>
  <defs>
    <marker id="ns-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7"
            markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888888" />
    </marker>
  </defs>
  <text x="380" y="24" fill="#888888" font-size="13" text-anchor="middle"
        font-weight="600">Durable event streams</text>
  <!-- producers column -->
  <g fill="none" stroke="#888888" stroke-width="1.4">
    <rect x="20" y="58"  width="132" height="40" rx="6" />
    <rect x="20" y="110" width="132" height="40" rx="6" />
    <rect x="20" y="162" width="132" height="40" rx="6" />
  </g>
  <g fill="#888888" font-size="12.5" text-anchor="middle">
    <text x="86" y="83">Services</text>
    <text x="86" y="135">Sagas</text>
    <text x="86" y="187">Triggers</text>
  </g>
  <text x="86" y="46" fill="#888888" font-size="11" text-anchor="middle"
        opacity="0.85">Producers</text>
  <!-- append arrows into log -->
  <g fill="none" stroke="#888888" stroke-width="1.5">
    <line x1="152" y1="78"  x2="296" y2="120" marker-end="url(#ns-arrow)" />
    <line x1="152" y1="130" x2="296" y2="130" marker-end="url(#ns-arrow)" />
    <line x1="152" y1="182" x2="296" y2="140" marker-end="url(#ns-arrow)" />
  </g>
  <text x="222" y="100" fill="#888888" font-size="10.5" text-anchor="middle"
        opacity="0.8">append</text>
  <!-- durable log -->
  <g fill="none" stroke="#888888" stroke-width="1.6">
    <rect x="300" y="92" width="160" height="76" rx="8" />
    <line x1="318" y1="118" x2="442" y2="118" />
    <line x1="318" y1="140" x2="442" y2="140" />
  </g>
  <g fill="#888888" font-size="13" text-anchor="middle">
    <text x="380" y="84">Append-only log</text>
  </g>
  <g fill="#888888" font-size="10" text-anchor="middle" opacity="0.8">
    <text x="380" y="111">offset n</text>
    <text x="380" y="133">offset n+1</text>
    <text x="380" y="158">offset n+2</text>
  </g>
  <!-- durable store under the log -->
  <g fill="none" stroke="#888888" stroke-width="1.4">
    <rect x="300" y="200" width="160" height="40" rx="6" />
    <line x1="380" y1="168" x2="380" y2="196" marker-end="url(#ns-arrow)" />
  </g>
  <g fill="#888888" font-size="12.5" text-anchor="middle">
    <text x="380" y="225">Durable store</text>
  </g>
  <text x="380" y="256" fill="#888888" font-size="10.5" text-anchor="middle"
        opacity="0.8">KV / Prisma</text>
  <!-- consumers -->
  <g fill="none" stroke="#888888" stroke-width="1.4">
    <rect x="608" y="78"  width="132" height="40" rx="6" />
    <rect x="608" y="130" width="132" height="40" rx="6" />
    <rect x="608" y="182" width="132" height="40" rx="6" />
  </g>
  <g fill="#888888" font-size="12.5" text-anchor="middle">
    <text x="674" y="103">Consumer A</text>
    <text x="674" y="155">Consumer B</text>
    <text x="674" y="207">Consumer C</text>
  </g>
  <text x="674" y="46" fill="#888888" font-size="11" text-anchor="middle"
        opacity="0.85">Subscriptions</text>
  <!-- fan-out arrows -->
  <g fill="none" stroke="#888888" stroke-width="1.5">
    <line x1="460" y1="120" x2="604" y2="98"  marker-end="url(#ns-arrow)" />
    <line x1="460" y1="130" x2="604" y2="150" marker-end="url(#ns-arrow)" />
    <line x1="460" y1="140" x2="604" y2="202" marker-end="url(#ns-arrow)" />
  </g>
  <text x="534" y="100" fill="#888888" font-size="10.5" text-anchor="middle"
        opacity="0.8">at-least-once</text>
</svg>
