<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 260" role="img"
     aria-label="Fresh page model: browser to Fresh route to server handler to SDK typed client to oRPC service to database, with island hydration returning to the browser across the contract boundary"
     font-family="DM Sans, Segoe UI, system-ui, sans-serif">
  <!-- Theme-neutral: transparent background, mid-tone (#888) strokes + text that read
       on both light and dark. Committed static SVG (OD1) — no client-side Mermaid. -->
  <defs>
    <marker id="ns-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7"
            markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888888" />
    </marker>
    <marker id="ns-arrow-dash" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7"
            markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888888" />
    </marker>
  </defs>
  <text x="360" y="22" fill="#888888" font-size="13" text-anchor="middle"
        font-weight="600">Fresh page model</text>

  <!-- contract boundary divider: client | server -->
  <g stroke="#888888" stroke-width="1" stroke-dasharray="3 4" opacity="0.6">
    <line x1="248" y1="40" x2="248" y2="238" />
  </g>
  <g fill="#888888" font-size="10" text-anchor="middle" opacity="0.75">
    <text x="130" y="50">client</text>
    <text x="484" y="50">server &middot; contract boundary</text>
  </g>

  <!-- nodes -->
  <g fill="none" stroke="#888888" stroke-width="1.5">
    <rect x="20"  y="70" width="112" height="50" rx="6" />
    <rect x="160" y="70" width="116" height="50" rx="6" />
    <rect x="304" y="70" width="116" height="50" rx="6" />
    <rect x="448" y="70" width="116" height="50" rx="6" />
    <rect x="592" y="70" width="112" height="50" rx="6" />
    <rect x="448" y="170" width="116" height="50" rx="6" />
    <!-- forward arrows L->R -->
    <line x1="132" y1="95" x2="156" y2="95" marker-end="url(#ns-arrow)" />
    <line x1="276" y1="95" x2="300" y2="95" marker-end="url(#ns-arrow)" />
    <line x1="420" y1="95" x2="444" y2="95" marker-end="url(#ns-arrow)" />
    <line x1="564" y1="95" x2="588" y2="95" marker-end="url(#ns-arrow)" />
    <!-- service -> database (down) -->
    <line x1="648" y1="120" x2="648" y2="155" />
    <line x1="648" y1="155" x2="566" y2="195" marker-end="url(#ns-arrow)" />
  </g>

  <!-- island hydration return path (dashed, client) -->
  <g fill="none" stroke="#888888" stroke-width="1.4" stroke-dasharray="5 4">
    <path d="M 362 120 C 362 150, 200 150, 92 122" marker-end="url(#ns-arrow-dash)" />
  </g>

  <!-- node labels -->
  <g fill="#888888" font-size="12.5" text-anchor="middle">
    <text x="76"  y="92">Browser</text>
    <text x="218" y="92">Fresh route</text>
    <text x="362" y="92">Server handler</text>
    <text x="506" y="92">SDK client</text>
    <text x="648" y="92">oRPC service</text>
    <text x="506" y="192">Database</text>
  </g>
  <g fill="#888888" font-size="10.5" text-anchor="middle" opacity="0.85">
    <text x="76"  y="108">island</text>
    <text x="218" y="108">definePage</text>
    <text x="362" y="108">loader</text>
    <text x="506" y="108">typed client</text>
    <text x="648" y="108">service</text>
    <text x="506" y="208">Prisma</text>
  </g>

  <!-- hydration label -->
  <text x="226" y="146" fill="#888888" font-size="10.5" text-anchor="middle"
        opacity="0.85">island hydrates in browser</text>
</svg>
