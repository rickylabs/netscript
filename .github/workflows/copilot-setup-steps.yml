# Copilot cloud agent environment bootstrap.
#
# GitHub runs the job named EXACTLY `copilot-setup-steps` before each Copilot
# cloud-agent session, with FULL network access. The agent session that follows
# is firewalled to the repo's custom allowlist
# (api.nuget.org, dl.deno.land, jsr.io, registry.npmjs.org, mcr.microsoft.com,
#  docker.io, registry-1.docker.io, production.cloudflare.docker.com).
# => Pre-warm every cache here so the firewalled session can run the S1 eval /
#    audit-fix passes (deno publish --dry-run, deno doc --lint, deno task check,
#    deno task e2e:cli) without a local agent.
#
# Toolchain pinned to this repo's reality:
#   - Deno 2.x  (deno.json uses unstable: kv, temporal, tsgo, worker-options, raw-imports)
#   - .NET SDK 10.x  (CLI scaffold AppHost/ServiceDefaults target net10.0)
#   - Aspire CLI via the official install script, pinned to a release + script hash
#     (NOT `dotnet workload install aspire`, which was removed after Aspire 8)
#   - Docker (pre-installed on ubuntu-latest; AppHost resources need the engine)
name: 'Copilot Setup Steps'

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read # clone + view the repo
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      # --- Deno (primary toolchain) ---
      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
          cache-hash: ${{ hashFiles('**/deno.json') }}

      # --- .NET SDK 10 (Aspire AppHost / ServiceDefaults target net10.0) ---
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      # --- Aspire CLI (standalone install script; adds $HOME/.aspire/bin to PATH) ---
      - name: Install Aspire CLI
        run: |
          set -euo pipefail
          aspire_version="13.4.2"
          # Commit d7d0b6759ce4b936c76bc4775814d27db560dd6d is the target
          # of the v13.4.2 release tag in dotnet/aspire.
          # To verify/update: inspect https://github.com/dotnet/aspire/releases/tag/v13.4.2.
          installer_url="https://raw.githubusercontent.com/dotnet/aspire/d7d0b6759ce4b936c76bc4775814d27db560dd6d/eng/scripts/get-aspire-cli.sh"
          installer_sha256="df1247d87f6e5ca83e71abf55f78bca1bd9a421a3f2f0fd5481f153fc958632a"
          installer="$(mktemp)"
          trap 'rm -f "$installer"' EXIT
          curl --fail --show-error --silent --location --proto '=https' --tlsv1.2 \
            --output "$installer" "$installer_url"
          # sha256sum --check expects: hash<two spaces>filename.
          if ! echo "$installer_sha256  $installer" | sha256sum --check; then
            echo "::error::Aspire installer hash verification failed for $installer_url"
            exit 1
          fi
          bash "$installer" --version "$aspire_version" --install-path "$HOME/.aspire/bin" --skip-path
          echo "$HOME/.aspire/bin" >> "$GITHUB_PATH"

      - name: Verify Aspire CLI
        run: |
          export PATH="$HOME/.aspire/bin:$PATH"
          aspire --version

      # --- Docker (AppHost container resources; engine is pre-installed) ---
      - name: Verify Docker
        run: |
          docker --version
          docker compose version

      # --- Pre-flight cache warming (full network is only available HERE) ---
      - name: Warm Deno dependency cache
        run: |
          set -euo pipefail
          deno --version
          # Resolve + cache package/plugin source dependencies (jsr: + npm:).
          deno_source_dirs=(packages plugins)
          missing_dirs=()
          for dir in "${deno_source_dirs[@]}"; do
            [[ -d "$dir" ]] || missing_dirs+=("$dir")
          done
          if ((${#missing_dirs[@]})); then
            echo "::warning::Expected Deno source directories missing (${missing_dirs[*]}); skipping Deno cache warming."
            exit 0
          fi
          mapfile -d '' deno_sources < <(find "${deno_source_dirs[@]}" -type f \( -name '*.ts' -o -name '*.tsx' -o -name '*.js' -o -name '*.jsx' \) -print0)
          if ((${#deno_sources[@]})); then
            # 50 files is a conservative margin for typical ~128 KB command-line limits.
            # --no-lock avoids mutating the checkout; this is only cache warming.
            if ! printf '%s\0' "${deno_sources[@]}" | xargs -0 -r -n 50 deno cache --config deno.json --no-lock; then
              echo "::warning::Deno cache warming failed. Non-fatal, but may affect firewalled sessions."
            fi
          fi

      - name: Warm .NET / NuGet (Aspire SDK packages)
        run: |
          # The e2e:cli scaffold restores Aspire.AppHost.Sdk +
          # CommunityToolkit.Aspire.Hosting.Deno from NuGet at build time.
          # api.nuget.org is on the agent allowlist, but pre-fetch the workload
          # SDK refs now to keep the firewalled session fast.
          dotnet nuget locals all --list || true
          dotnet workload list || true
