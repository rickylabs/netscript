name: ci

# Minimal S1 pre-merge gate: repo-wide `deno check` + repo-wide `deno test` — the
# service-free static + unit gates that run on a stock runner. The CLI runtime e2e
# (`deno task e2e:cli` / scaffold.runtime) is intentionally NOT here: it spawns the
# `aspire` CLI, `docker`, and `postgres`, which `ubuntu-latest` does not provision, so it
# belongs in S2's full CI (which sets up the toolchain + services). Full CI (lint, fmt,
# doc-lint, publish dry-run, audit, coverage, OIDC publish) is scoped to S2 (toolchain) +
# S3 (cicd-release). Keep this lean so `feat/package-quality` -> `main` is gated on
# service-free health, not on toolchain availability or tangential advisories.

on:
  push:
    branches: [main, "feat/package-quality"]
  pull_request:
    branches: [main, "feat/package-quality"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: "2.8.3"

      - name: Install workspace dependencies
        run: deno install

      - name: Repo-wide check
        run: deno task check

      - name: Repo-wide test
        run: deno task test
