name: ci

# S2 full CI. Lanes over the existing `deno task`s:
#
#   - `check-test` — the lean, required S1 pre-merge gate: repo-wide `deno check`
#     + `deno test`, the service-free static + unit gates that run on a stock
#     runner. Kept intentionally minimal so `feat/package-quality` -> `main` is
#     gated on service-free health, not on toolchain availability or tangential
#     advisories.
#
#   - `quality` — the S2 full quality lane the original header reserved: lint,
#     fmt, scaffold-version guard, publish dry-run, and critical advisory audit.
#     Required on `main` by the active `main-branch-protection` repository
#     ruleset. A failure blocks only while that required-check rule remains in
#     force; keeping a gate inside a non-required job would not enforce it.
#
#   - `deps-report` — non-blocking dependency-freshness report (informational).
#
# Still out of scope here (deferred Phase-2 "repo process automation" umbrella):
# the toolchain-heavy CLI runtime e2e (`deno task e2e:cli` / scaffold.runtime,
# which spawns `aspire` + `docker` + `postgres`), OIDC publish (S3), and the
# label/Projects automation.

on:
  push:
    branches: [main, "feat/package-quality"]
  pull_request:
    branches: [main, "feat/**", "epic/**"]

permissions:
  contents: read
  issues: read
  pull-requests: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  close-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      issues: write
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: "2.9.0"

      - name: Mirror structured acceptance evidence
        if: contains(github.event.pull_request.labels.*.name, 'status:ready-merge')
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: >
          deno run --allow-env --allow-net
          .llm/tools/validation/mirror-acceptance-evidence.ts
          --repo "${{ github.repository }}"
          --pr "${{ github.event.pull_request.number }}"
          --pretty

      - name: Referenced issue acceptance gate
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: >
          deno run --allow-env --allow-net
          .llm/tools/validation/check-close-gate.ts
          --repo "${{ github.repository }}"
          --pr "${{ github.event.pull_request.number }}"
          --pretty

  check-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: "2.9.0"

      - name: Install workspace dependencies
        run: deno install

      - name: Repo-wide check
        run: deno task check

      - name: Repo-wide test
        run: deno task test

      - name: Agentic OpenRouter preset canary
        run: deno task agentic:provider-canary

  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: "2.9.0"

      - name: Install workspace dependencies
        run: deno install

      - name: Lint
        run: deno task lint

      - name: Format check
        run: deno task fmt:check

      - name: Generated asset freshness
        run: deno task check:assets-barrel

      - name: Scaffold version guard (no preview pins)
        run: deno task check:scaffold-versions

      - name: Publish dry-run (0 slow-types across all units)
        run: deno task publish:dry-run

      - name: Critical advisory audit
        run: deno task audit:critical

  deps-report:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: "2.9.0"

      - name: Install workspace dependencies
        run: deno install

      - name: Dependency freshness (report-only)
        run: deno task deps:latest
        continue-on-error: true

  lane-visibility:
    name: core CI lane visibility
    needs: [close-gate, check-test, quality, deps-report]
    if: ${{ always() && github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Summarize core lane outcomes
        env:
          CLOSE_GATE_RESULT: ${{ needs.close-gate.result }}
          CHECK_TEST_RESULT: ${{ needs.check-test.result }}
          QUALITY_RESULT: ${{ needs.quality.result }}
          DEPS_REPORT_RESULT: ${{ needs.deps-report.result }}
        run: |
          {
            echo "## Core CI lane visibility"
            echo
            echo "These lanes were scheduled for this pull request; each outcome is the terminal job result."
            echo
            echo "| Lane | Outcome |"
            echo "| --- | --- |"
            printf '| `close-gate` | ran (%s) |\n' "$CLOSE_GATE_RESULT"
            printf '| `check-test` | ran (%s) |\n' "$CHECK_TEST_RESULT"
            printf '| `quality` | ran (%s) |\n' "$QUALITY_RESULT"
            printf '| `deps-report` | ran (%s) |\n' "$DEPS_REPORT_RESULT"
          } >> "$GITHUB_STEP_SUMMARY"
