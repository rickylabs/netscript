name: publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish and update, for example v0.0.1-alpha.1."
        required: false
        type: string
      dry_run:
        description: "Run the publish path without publishing or editing release notes."
        required: false
        default: false
        type: boolean

permissions:
  id-token: write
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # Human release flow:
      # 1. The supervisor drafts one GitHub Release for v0.0.1-alpha.1.
      # 2. Publishing that Release creates/uses the v* tag and triggers this workflow.
      # 3. The workflow publishes every @netscript workspace member to JSR with OIDC provenance.
      # 4. After publish succeeds, the workflow appends managed JSR package links to the Release.
      - name: Resolve release inputs
        id: release
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          tag="${RELEASE_TAG:-${INPUT_TAG:-}}"
          if [ -z "$tag" ]; then
            tag="${GITHUB_REF_NAME:-}"
          fi
          version="${tag#v}"
          dry_run="${INPUT_DRY_RUN:-false}"
          if [ "$EVENT_NAME" = "release" ]; then
            dry_run="false"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "dry_run=$dry_run" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.release.outputs.tag || github.ref }}

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: "2.9.0"

      - name: Ensure JSR packages exist
        env:
          JSR_API_TOKEN: ${{ secrets.JSR_API_TOKEN }}
        run: deno run --allow-net --allow-read --allow-env .llm/tools/release/jsr-provision-packages.ts

      - name: Release preflight
        run: deno task release:preflight

      - name: Publish dry-run
        run: deno run --allow-read --allow-write --allow-run .llm/tools/release/run-publish.ts --dry-run

      # Real-publish-equivalent preflight. `deno publish --dry-run` is a blind
      # spot: it can pass while the REAL publish module-graph build rejects a
      # module — exactly how alpha.5 produced a partial/half publish (23 of 31
      # members). This step runs the real `deno publish` (not --dry-run) with an
      # invalid token, so it builds every member's publish graph in the real code
      # path and then fails at the auth boundary BEFORE any upload. A graph/check
      # error here fails the job before the Publish step below, so a release can
      # never half-publish. It never uploads (the token is invalid by design).
      - name: Publish preflight (real graph build, no upload)
        run: deno run --allow-read --allow-write --allow-run .llm/tools/release/run-publish.ts --preflight

      # Deno 2.9 publish resilience (relied on by the atomic whole-workspace
      # publish in .llm/tools/release/publish-workspace.ts):
      #   - skip-already-published (denoland/deno#35134): members already on the
      #     registry at this version are skipped, so re-running after a partial
      #     publish is idempotent (this is why the dry-run step above and a retry
      #     of this step are both safe).
      #   - continue-after-member-failure (denoland/deno#35133): a single member
      #     failing no longer aborts the remaining members; the overall exit code
      #     still reflects failure, which run-publish.ts surfaces as a thrown error.
      #   - asset inclusion (denoland/deno#35331): non-code package assets are
      #     carried in the published tarball.
      - name: Publish
        if: steps.release.outputs.dry_run != 'true'
        run: deno run --allow-read --allow-write --allow-run .llm/tools/release/run-publish.ts

      - name: Write published version
        if: steps.release.outputs.dry_run != 'true'
        run: printf '%s\n' "${{ steps.release.outputs.version }}" > version.txt

      - name: Upload published version
        if: steps.release.outputs.dry_run != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: netscript-published-version-${{ github.run_id }}
          path: version.txt
          if-no-files-found: error

      # Master switch for the settings reconciliation below. Reads
      # `applyOnPublish` from jsr-package-settings.json (absent => true for
      # back-compat). Set it false when the JSR presentation settings are already
      # applied and unchanged, so a release run neither depends on a settings-edit
      # token nor re-PATCHes unchanged values (a failing PATCH would otherwise red
      # the post-publish run even though publish itself succeeded).
      - name: Resolve JSR settings sync
        id: jsr_settings
        run: |
          set -euo pipefail
          apply="$(jq -r 'if has("applyOnPublish") then .applyOnPublish else true end' jsr-package-settings.json)"
          echo "apply=$apply" >> "$GITHUB_OUTPUT"
          echo "applyOnPublish=$apply (from jsr-package-settings.json)"

      # JSR presentation settings (readmeSource, description, runtimeCompat) are
      # server-side and not carried in the tarball, so they cannot be baked into
      # a version. Reconcile them on every publish so the README renders on each
      # package's main page, the description stays in sync with the README
      # tagline, and Deno shows as the supported runtime. Idempotent. Gated by the
      # applyOnPublish master switch resolved above.
      # Non-critical: presentation settings must never red (or block) a run whose
      # JSR publish already succeeded. --best-effort exits 0 on per-package/API
      # failures and continue-on-error covers unexpected crashes; recover with the
      # standalone jsr-settings.yml dispatch (optionally per package).
      - name: Apply JSR package settings
        if: steps.release.outputs.dry_run != 'true' && steps.jsr_settings.outputs.apply == 'true'
        continue-on-error: true
        env:
          JSR_API_TOKEN: ${{ secrets.JSR_API_TOKEN }}
        run: deno run --allow-net --allow-read --allow-env .llm/tools/release/jsr-set-package-settings.ts --best-effort

      - name: Update GitHub Release with JSR links
        if: steps.release.outputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail
          if [ -z "$TAG" ]; then
            echo "No release tag resolved; cannot update GitHub Release notes." >&2
            exit 1
          fi
          mkdir -p .llm/tmp
          gh release view "$TAG" --json body --jq '.body // ""' > .llm/tmp/release-body.md
          deno run --allow-read --allow-write .llm/tools/release/run-publish.ts \
            --update-release-body \
            --version "$VERSION" \
            --body-file .llm/tmp/release-body.md \
            --out .llm/tmp/release-body-updated.md
          gh release edit "$TAG" --notes-file .llm/tmp/release-body-updated.md
          # Latest-badge backstop: GitHub never marks a prerelease as "Latest", so a
          # release cut with the prerelease flag set strands the badge on an older
          # version (this is exactly how alpha.16 held Latest through alpha.19). Every
          # published release is the newest visible version, so force it non-prerelease
          # and Latest here. Idempotent; safe to run when release:publish already set it.
          gh release edit "$TAG" --prerelease=false --latest
