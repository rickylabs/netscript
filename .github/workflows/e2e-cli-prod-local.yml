name: e2e-cli-prod-local

# Prod-local validates the local public CLI binary with generated workspaces
# resolving `@netscript/*` from JSR. It does not install or publish the CLI.
#
# Blind spot: because the CLI binary is loaded from local source (`file://`), this
# workflow does NOT exercise the `https://` asset-read path and cannot catch the
# CLI-self-asset class tracked in #124. That remains covered exclusively by the
# published-CLI smoke in e2e-cli-prod.yml.
#
# Trigger: runs after the `publish` workflow completes successfully, NOT on every
# push to main. On a release cut the merge push lands the bumped `@netscript/*`
# version before `publish` uploads it to JSR, so a push-triggered run resolved a
# not-yet-published version and failed (e.g. scaffold.plugin-list). Gating on
# `workflow_run` after `publish` plus a fixed JSR-propagation delay removes that
# race. Non-release main pushes do not change the published `@netscript/*` graph,
# so there is nothing new for this JSR-resolving smoke to validate on them.

on:
  workflow_run:
    workflows: ["publish"]
    types: [completed]
  workflow_dispatch:

permissions:
  actions: read
  contents: read

concurrency:
  group: e2e-cli-prod-local-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  scaffold-runtime-prod-local:
    name: scaffold-runtime (local public CLI + JSR deps)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: '2.9.0'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install Aspire CLI
        env:
          ASPIRE_CLI_VERSION: '13.4.6'
        run: |
          dotnet tool install Aspire.Cli --tool-path "$HOME/.aspire/bin" --version "$ASPIRE_CLI_VERSION"
          echo "$HOME/.aspire/bin" >> "$GITHUB_PATH"

      - name: Aspire CLI preflight
        run: |
          aspire_version="$(aspire --version)"
          echo "$aspire_version"
          case "$aspire_version" in
            13.4.*) ;;
            *) echo "Expected Aspire CLI 13.4.x, got $aspire_version" >&2; exit 1 ;;
          esac

      - name: Wait for JSR propagation
        if: github.event_name == 'workflow_run'
        run: |
          echo "publish completed; sleeping 120s so the just-published @netscript/* versions become resolvable on JSR before the generated workspace pins them."
          sleep 120

      - name: Install workspace dependencies
        run: deno install

      - name: Full scaffold runtime E2E (prod-local, one pass)
        run: |
          deno task e2e:cli:prod \
            --cleanup \
            --format pretty \
            --report .llm/tmp/cli-e2e-prod-local-report.json \
            --log-file .llm/tmp/cli-e2e-prod-local.ndjson

      - name: Report prod-local E2E failure
        if: failure()
        run: |
          echo "::error::Prod-local CLI E2E failed for the local public binary with JSR dependencies."

      - name: Upload prod-local E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-cli-prod-local
          path: |
            .llm/tmp/cli-e2e-prod-local-report.json
            .llm/tmp/cli-e2e-prod-local.ndjson
          if-no-files-found: ignore
