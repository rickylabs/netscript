name: e2e-cli-prod

on:
  workflow_run:
    workflows: ["publish"]
    types: [completed]
  workflow_dispatch:
    inputs:
      published-version:
        description: Published @netscript/cli version to validate
        required: true
        type: string

permissions:
  actions: read
  contents: read

concurrency:
  group: e2e-cli-prod-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  scaffold-runtime-jsr:
    name: scaffold-runtime (published JSR CLI)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: '2.9.0'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install Aspire CLI
        env:
          ASPIRE_CLI_VERSION: '13.4.6'
        run: |
          dotnet tool install Aspire.Cli --tool-path "$HOME/.aspire/bin" --version "$ASPIRE_CLI_VERSION"
          echo "$HOME/.aspire/bin" >> "$GITHUB_PATH"

      - name: Download published version
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          name: netscript-published-version-${{ github.event.workflow_run.id }}
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}
          path: .llm/tmp/published-version

      - name: Resolve published version
        id: version
        env:
          DISPATCH_VERSION: ${{ github.event.inputs['published-version'] }}
          VERSION_FILE: .llm/tmp/published-version/version.txt
        run: |
          version="${DISPATCH_VERSION:-}"
          if [ -z "$version" ] && [ -f "$VERSION_FILE" ]; then
            version="$(cat "$VERSION_FILE")"
          fi
          if [ -z "$version" ]; then
            echo "A published version is required." >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Wait for JSR propagation
        if: github.event_name == 'workflow_run'
        run: |
          echo "sleeping 120s so just-published @netscript/cli@${{ steps.version.outputs.version }} and deps become resolvable on JSR before install."
          sleep 120

      - name: Install published CLI from JSR
        run: |
          echo "$HOME/.deno/bin" >> "$GITHUB_PATH"
          deno install -g -A --minimum-dependency-age=0 -n netscript "jsr:@netscript/cli@${{ steps.version.outputs.version }}"
          netscript --help

      - name: Install workspace dependencies
        run: deno install

      - name: Public init smoke from JSR CLI
        run: |
          rm -rf .llm/tmp/cli-prod-init-smoke
          netscript init cli-prod-init-smoke \
            --path .llm/tmp \
            --ci \
            --yes \
            --no-git \
            --no-aspire \
            --force
          test -f .llm/tmp/cli-prod-init-smoke/deno.json

      - name: Full scaffold runtime E2E (published CLI, one pass)
        run: |
          deno task e2e:cli run scaffold.runtime \
            --source jsr \
            --cli "jsr:@netscript/cli@${{ steps.version.outputs.version }}" \
            --cleanup \
            --format pretty \
            --report .llm/tmp/cli-e2e-prod-report.json \
            --log-file .llm/tmp/cli-e2e-prod.ndjson

      - name: Report production E2E failure
        if: failure()
        run: |
          echo "::error::Production CLI E2E failed for @netscript/cli@${{ steps.version.outputs.version }}."

      - name: Upload production E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-cli-prod-${{ steps.version.outputs.version }}
          path: |
            .llm/tmp/cli-e2e-prod-report.json
            .llm/tmp/cli-e2e-prod.ndjson
          if-no-files-found: ignore
