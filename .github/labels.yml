# NetScript label taxonomy — the documented source of truth.
#
# Namespaced, colon-delimited labels (`type:`, `status:`, `area:`, `priority:`, `ci:`, `gate:`,
# `wave:`) plus a small set of GitHub-standard triage labels. The canonical narrative lives in the
# `netscript-pr` skill and CONTRIBUTING.md; this file is the machine-readable mirror for a future
# label-sync workflow.
#
# RULES:
# - Exactly ONE `status:` label on an open issue/PR at a time (it is the board column).
# - `type:`/`area:`/`priority:` are additive.
# - Add new labels here first, then create them; do NOT delete existing labels (that strips them
#   off live issues) — deprecate in this file and propose removal to the maintainer.

# ── type: what kind of change ────────────────────────────────────────────────
- name: "type:feat"
  color: "c5def5"
  description: "New feature or capability"
- name: "type:fix"
  color: "c5def5"
  description: "Bug fix"
- name: "type:docs"
  color: "c5def5"
  description: "Documentation change"
- name: "type:chore"
  color: "c5def5"
  description: "Tooling, config, or housekeeping"
- name: "type:refactor"
  color: "c5def5"
  description: "Internal change with no behavior change"
- name: "type:perf"
  color: "c5def5"
  description: "Performance improvement"
- name: "type:test"
  color: "c5def5"
  description: "Tests only"
- name: "type:umbrella"
  color: "5319e7"
  description: "Coordinating PR for a multi-slice effort"
- name: "type:sub-pr"
  color: "0e8a16"
  description: "Stacked sub-PR (leaf of an umbrella)"

# ── status: harness/board phase (exactly one at a time) ──────────────────────
- name: "status:triage"
  color: "fbca04"
  description: "Incoming; not yet triaged"
- name: "status:research"
  color: "fbca04"
  description: "Harness research phase"
- name: "status:plan"
  color: "fbca04"
  description: "Harness plan phase"
- name: "status:plan-eval"
  color: "fbca04"
  description: "Awaiting plan evaluation"
- name: "status:impl"
  color: "fbca04"
  description: "Implementation in progress"
- name: "status:impl-eval"
  color: "fbca04"
  description: "Awaiting implementation evaluation (merge gate)"
- name: "status:augment-review"
  color: "fbca04"
  description: "Advisory augment/review pass"
- name: "status:ci-fail"
  color: "fbca04"
  description: "Blocked on a failing CI gate"
- name: "status:ready-merge"
  color: "0e8a16"
  description: "Green and cleared to merge"

# ── priority: ────────────────────────────────────────────────────────────────
- name: "priority:p0"
  color: "b60205"
  description: "Critical / release blocker"
- name: "priority:p1"
  color: "d93f0b"
  description: "High"
- name: "priority:p2"
  color: "fbca04"
  description: "Medium"
- name: "priority:p3"
  color: "0e8a16"
  description: "Low / nice-to-have"

