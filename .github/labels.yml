- name: "area:database"
  color: "bfdadc"
  description: "packages/database and adapters"
- name: "area:kv"
  color: "bfdadc"
  description: "packages/kv"
- name: "area:sdk"
  color: "bfdadc"
  description: "packages/sdk"
- name: "area:service"
  color: "bfdadc"
  description: "packages/service"
- name: "area:config"
  color: "bfdadc"
  description: "packages/config and runtime-config"
- name: "area:telemetry"
  color: "bfdadc"
  description: "packages/telemetry"
- name: "area:ai-core"
  color: "1d76db"
