# ── ci: manual overrides for path-filtered CI ────────────────────────────────
- name: "ci:full"
  color: "d4c5f9"
  description: "Force the full CI/e2e run"
- name: "ci:skip-e2e"
  color: "d4c5f9"
  description: "Suppress the e2e tier"
- name: "gate:e2e"
  color: "d4c5f9"
  description: "Run the toolchain-heavy e2e-cli gate"
- name: "gate:jsr"
  color: "d4c5f9"
  description: "Run the JSR publish/audit gate"

# ── epic: program epics ──────────────────────────────────────────────────────
- name: "epic:deployment"
  color: "5319e7"
  description: "Enterprise deployment framework epic"
- name: "epic:ai-stack"
  color: "5319e7"
  description: "AI plugin stack epic"
- name: "epic:harness-v3"
  color: "3e4b9e"
  description: "Agentic Workflow Doctrine V3 program"
- name: "epic:roadmap-reforecast"
  color: "5319e7"
  description: "beta.3-to-stable roadmap re-forecast program"

# ── cross-cutting flags ──────────────────────────────────────────────────────
- name: "rfc"
  color: "5319e7"
  description: "Request for Comments — substantial/breaking design change"
- name: "breaking"
  color: "b60205"
  description: "Introduces a breaking change"
- name: "good first issue"
  color: "7057ff"
  description: "Good for newcomers"
- name: "help wanted"
  color: "008672"
  description: "Extra attention is needed"

# ── GitHub-standard triage labels (retained) ─────────────────────────────────
- name: "bug"
  color: "d73a4a"
  description: "Something isn't working"
- name: "enhancement"
  color: "a2eeef"
  description: "New feature or request"
- name: "documentation"
  color: "0075ca"
  description: "Improvements or additions to documentation"
- name: "duplicate"
  color: "cfd3d7"
  description: "This issue or pull request already exists"
- name: "wontfix"
  color: "ffffff"
  description: "This will not be worked on"
