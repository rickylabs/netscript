name: Bug report
description: Report a defect in a NetScript package, plugin, or the CLI.
title: "bug: "
labels: ["bug", "status:triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please search existing issues first to avoid duplicates.
        For usage questions use [Discussions → Q&A](https://github.com/rickylabs/netscript/discussions/categories/q-a);
        for security issues use [private reporting](https://github.com/rickylabs/netscript/security/advisories/new).
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear, one-paragraph description of the bug.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the framework is affected? (maps to the `area:*` labels)
      options:
        - cli
        - fresh
        - fresh-ui
        - plugins
        - auth
        - aspire
        - database
        - kv
        - sdk
        - service
        - config
        - telemetry
        - ai-core / plugin-ai
        - tooling
        - docs
        - unsure
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Minimal, deterministic steps to reproduce. A repo or scaffold command sequence is ideal.
      placeholder: |
        1. `netscript init ...`
        2. `netscript plugin add workers`
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include exact error output, stack traces, and exit codes.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Output of `deno --version`, plus OS, and the NetScript / `@netscript/*` version(s) in use.
      render: shell
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission checklist
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: This is a reproducible defect, not a usage question (those belong in Discussions).
          required: true
