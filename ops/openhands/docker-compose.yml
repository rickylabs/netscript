services:
  openhands:
    image: ${OPENHANDS_IMAGE:-docker.openhands.dev/openhands/openhands:1.6}
    restart: unless-stopped
    ports:
      - '${OPENHANDS_PORT:-3000}:3000'
    environment:
      SANDBOX_RUNTIME_CONTAINER_IMAGE: ${SANDBOX_RUNTIME_CONTAINER_IMAGE:-docker.all-hands.dev/all-hands-ai/runtime:0.39-nikolaik}
      LOG_ALL_EVENTS: ${LOG_ALL_EVENTS:-true}
      LLM_MODEL: ${LLM_MODEL:-anthropic/claude-sonnet-4}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - openhands-state:/.openhands
      - openhands-workspace:/workspace
    extra_hosts:
      - host.docker.internal:host-gateway

volumes:
  openhands-state:
  openhands-workspace:
