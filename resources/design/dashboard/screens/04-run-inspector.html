        try { dark = new URLSearchParams(location.search).get('theme') === 'dark'; } catch (e) {}
        if (dark) document.documentElement.dataset.theme = 'dark';
        else delete document.documentElement.dataset.theme;
        try { localStorage.setItem('ns-theme', dark ? 'dark' : 'light'); } catch (e) {}
      })();
    </script>

        var STATUS_VARIANT = {
          running: 'primary',
          completed: 'success',
          failed: 'destructive',
          retrying: 'warning',
          degraded: 'warning',
          queued: 'muted',

        function StatusBadge(status) {
          return h(NS.Badge, { variant: STATUS_VARIANT[status] || 'muted' }, status);
        }

        function Shell(props) {
          return h(NS.SidebarShell, {
            pathname: '/runs',
            navigation: NAV,
            brand: 'NetScript',

              status: 'retrying', attempt: 2, maxAttempts: 5, lastError: 'ECONNRESET',
            },
          },
          {
            id: 'r4',
            title: 'email.send · job_4177',
            plugin: 'workers',
            status: 'failed',

          {

            ],
            context: [

          },
          {
            id: 'r6',

            stats: [

            ],

        ];

        /* ---------- filter + run list ---------- */

        function RunList(props) {
          var runs = RUNS.filter(function (run) {
            if (props.status !== 'all' && run.status !== props.status) return false;
            if (props.plugin !== 'all' && run.plugin !== props.plugin) return false;
            return true;
          });
          return h('div', { class: 'ns-stack ns-stack--md' }, [
            h(NS.FilterForm, { key: 'filters' }, [
              h(NS.FilterForm.Body, { key: 'body' }, [
                h(NS.FormField, { key: 'status', label: 'status', name: 'status' },
                  h(NS.Select, {
                    value: props.status,
                    onChange: function (e) { props.onStatus(e.target.value); },
                    options: [
                      { value: 'all', label: 'All statuses' },
                      { value: 'running', label: 'running' },
                      { value: 'completed', label: 'completed' },
                      { value: 'failed', label: 'failed' },
                      { value: 'retrying', label: 'retrying' },
                      { value: 'queued', label: 'queued' },
                      { value: 'degraded', label: 'degraded' },
                    ],
                  })),
                h(NS.FormField, { key: 'plugin', label: 'capability', name: 'plugin' },
                  h(NS.Select, {
                    value: props.plugin,
                    onChange: function (e) { props.onPlugin(e.target.value); },
                    options: [
                      { value: 'all', label: 'All capabilities' },
                      { value: 'workers', label: 'workers' },
                      { value: 'sagas', label: 'sagas' },
                      { value: 'triggers', label: 'triggers' },
                      { value: 'streams', label: 'streams' },
                    ],
                  })),
              ]),
              h(NS.FilterForm.Actions, { key: 'actions' }, [
                h(NS.Button, {
                  key: 'reset',
                  variant: 'ghost',
                  size: 'sm',
                  onClick: function () { props.onStatus('all'); props.onPlugin('all'); },
                }, 'Reset'),
              ]),
            ]),
            runs.length === 0
              ? h(NS.EmptyState, { key: 'empty', heading: 'No runs match' },
                'Loosen the status or capability filter.')
              : h('div', { key: 'list', class: 'ns-entity-rail', role: 'listbox', 'aria-label': 'Runs' },
                runs.map(function (run) {
                  var selected = props.selectedId === run.id;
                  return h('button', {
                    key: run.id,
                    type: 'button',
                    role: 'option',
                    class: 'ns-entity-rail__item',
                    'data-state': selected ? 'selected' : undefined,
                    'aria-selected': selected ? 'true' : 'false',
                    onClick: function () { props.onSelect(run.id); },
                  }, [
                    h('span', { key: 't', class: 'ns-entity-rail__title' }, [
                      h('span', { key: 'n' }, run.title),
                      h(R.Fragment, { key: 'b' }, StatusBadge(run.status)),
                    ]),
                    h('span', { key: 'm', class: 'ns-entity-rail__meta' }, run.plugin + ' · ' + run.meta),
                  ]);
                })),
          ]);
        }

        /* ---------- step timeline ---------- */

        function StepTimeline(props) {
          return h('ol', { class: 'ns-step-timeline', 'data-view': props.view }, props.run.steps.map(function (step, i) {
            var hasIo = step.payload || step.result;
            return h('li', { key: i, class: 'ns-step-timeline__step', 'data-state': step.status }, [
              h('span', { key: 'marker', class: 'ns-step-timeline__marker', 'aria-hidden': 'true' }),
              h('div', { key: 'main', class: 'ns-step-timeline__main' }, [
                h('span', { key: 'title', class: 'ns-step-timeline__title' }, [
                  h('span', { key: 'n' }, step.name),
                  h('span', { key: 'a', class: 'ns-step-timeline__attempts' }, step.attempts),
                ]),
                h('span', { key: 'meta', class: 'ns-step-timeline__meta' }, [
                  h('span', { key: 'd' }, step.dur),
                  h('span', { key: 'sep', 'aria-hidden': 'true' }, '·'),
                  h('span', { key: 't' }, step.ts),
                ]),
                hasIo && h('details', { key: 'body', class: 'ns-step-timeline__body' }, [
                  h('summary', { key: 's' }, 'payload · result'),
                  h('div', { key: 'io', class: 'ns-step-timeline__io' }, [
                    step.payload && h(NS.CodeBlock, { key: 'p', code: step.payload, lang: 'json' }),
                    step.result && h(NS.CodeBlock, { key: 'r', code: step.result, lang: 'json' }),
                  ]),
                ]),
              ]),
            ]);
          }));
        }

        /* ---------- run detail ---------- */

        function RunDetail(props) {
          var run = props.run;
          if (!run) {
            return h(NS.EmptyState, { heading: 'No run selected' },
              'Select a run to inspect steps, attempts, and payloads.');
          }
          return h('div', { class: 'ns-stack ns-stack--md' }, [
            h(NS.Card, { key: 'card' }, [
              h(NS.Card.Header, { key: 'head' }, [
                h('div', { key: 't', class: 'ns-stack ns-stack--xs' }, [
                  h(NS.Card.Title, { key: 'h' }, run.title),
                  h(NS.Card.Description, { key: 'd' }, run.plugin + ' · ' + run.meta),
                ]),
                h(R.Fragment, { key: 'b' }, StatusBadge(run.status)),
              ]),
              h(NS.Card.Body, { key: 'body', class: 'ns-stack ns-stack--md' }, [
                h(NS.StatsGrid, { key: 'stats' }, run.stats.map(function (s, i) {
                  return h(NS.StatsGrid.Card, { key: i, label: s[0], value: s[1], detail: s[2] });
                })),
                h(NS.Tabs.Root, { key: 'views', defaultValue: 'all' }, [
                  h(NS.Tabs.List, { key: 'list', class: 'ns-tabs__list', 'aria-label': 'Timeline view' }, [
                    h(NS.Tabs.Trigger, { key: 'all', value: 'all', class: 'ns-tabs__trigger' }, 'All'),
                    h(NS.Tabs.Trigger, { key: 'compact', value: 'compact', class: 'ns-tabs__trigger' }, 'Compact'),
                    h(NS.Tabs.Trigger, { key: 'json', value: 'json', class: 'ns-tabs__trigger' }, 'JSON'),
                  ]),
                  h(NS.Tabs.Content, { key: 'c-all', value: 'all', class: 'ns-tabs__content' },
                    h(StepTimeline, { run: run, view: 'all' })),
                  h(NS.Tabs.Content, { key: 'c-compact', value: 'compact', class: 'ns-tabs__content' },
                    h(StepTimeline, { run: run, view: 'compact' })),
                  h(NS.Tabs.Content, { key: 'c-json', value: 'json', class: 'ns-tabs__content' },
                    h(NS.CodeBlock, { code: JSON.stringify(run.json, null, 2), lang: 'json' })),
                ]),
              ]),
            ]),
          ]);
        }

        /* ---------- context rail ---------- */

        function RunRail(props) {
          var run = props.run;
          if (!run) return null;
          return h('div', { class: 'ns-stack ns-stack--md' }, [
            h(NS.Panel, { key: 'events', tone: 'raised' }, [
              h(NS.Panel.Header, { key: 'h' }, h(NS.Panel.Title, null, 'Events')),
              h(NS.Panel.Body, { key: 'b' },
                h('div', { class: 'ns-activity-feed' }, run.events.map(function (ev, i) {
                  return h('div', { key: i, class: 'ns-activity-feed__item', 'data-tone': ev.tone }, [
                    h('span', { key: 'm', class: 'ns-activity-feed__marker', 'aria-hidden': 'true' }),
                    h('div', { key: 'b', class: 'ns-activity-feed__body' }, [
                      h('p', { key: 't', class: 'ns-activity-feed__text' }, ev.text),
                      h('p', { key: 'ts', class: 'ns-activity-feed__time' }, ev.time),
                    ]),
                  ]);
                }))),
            ]),
            h(NS.Panel, { key: 'context', tone: 'muted' }, [
              h(NS.Panel.Header, { key: 'h' }, h(NS.Panel.Title, null, 'Context')),
              h(NS.Panel.Body, { key: 'b' },
                h('div', { class: 'ns-connector' }, run.context.map(function (row, i) {
                  return h('span', { key: i, class: 'ns-connector__row' }, [
                    h('span', { key: 'p', class: 'ns-connector__probe' }, row[0]),
                    row[2]
                      ? h('code', { key: 'r', class: 'ns-inline-code' }, row[1])
                      : h('span', { key: 'r', class: 'ns-connector__result' }, row[1]),
                  ]);
                }))),
              h(NS.Panel.Footer, { key: 'f', class: 'ns-cluster ns-cluster--sm' }, [
                h(NS.Button, { key: 'trace', variant: 'ghost', size: 'sm' }, 'Open trace'),
                h(NS.Button, { key: 'retry', variant: 'outline', size: 'sm' }, 'Retry run'),
              ]),
            ]),
          ]);
        }

        /* ---------- page ---------- */

        function Page() {
          var selSt = R.useState('r1');
          var selectedId = selSt[0], setSelectedId = selSt[1];
          var statusSt = R.useState('all');
          var status = statusSt[0], setStatus = statusSt[1];
          var pluginSt = R.useState('all');
          var plugin = pluginSt[0], setPlugin = pluginSt[1];

          var run = null;
          RUNS.forEach(function (r) { if (r.id === selectedId) run = r; });

          return h(Shell, null, h('div', { class: 'ns-stack ns-stack--lg' }, [
            h(NS.PageHeader, { key: 'header', class: 'ns-page-header--console' },
              h(NS.PageHeader.Main, null, [
                h(NS.PageHeader.Intro, { key: 'intro' }, [
                  h('h1', { key: 'h' }, 'Runs'),
                  h('p', { key: 'p', class: 'ns-lede' },
                    'Jobs, saga runs, firings, and deliveries in one inspector. Steps, attempts, and payloads for each.'),
                ]),
                h(NS.PageHeader.Status, { key: 'status' }, [
                  h('span', { key: '1' }, '7 runs in the last 10 min'),
                  h('span', { key: 's1', class: 'ns-status-bar__sep' }, '·'),
                  h('span', { key: '2' }, '1 failed'),
                  h('span', { key: 's2', class: 'ns-status-bar__sep' }, '·'),
                  h('span', { key: '3' }, '1 retrying'),
                  h('span', { key: 's3', class: 'ns-status-bar__sep' }, '·'),
                  h('span', { key: '4' }, '1 degraded'),
                ]),
              ]),
            ),
            h('div', { key: 'body', class: 'ns-rail-grid' }, [
              h(RunList, {
                key: 'list',
                selectedId: selectedId,
                status: status,
                plugin: plugin,
                onStatus: setStatus,
                onPlugin: setPlugin,
                onSelect: setSelectedId,
              }),
              h('div', { key: 'main', class: 'ns-content-rail' }, [
                h('div', { key: 'detail' }, h(RunDetail, { run: run })),
                h('div', { key: 'rail' }, h(RunRail, { run: run })),
              ]),
            ]),
          ]));
        }

        ReactDOM.createRoot(document.getElementById('root')).render(h(Page));
      })();
    </script>
  </body>
</html>
