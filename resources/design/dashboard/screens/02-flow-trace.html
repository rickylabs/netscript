        else delete document.documentElement.dataset.theme;

        /* ---------- waterfall ---------- */

        function Waterfall(props) {
          var trace = props.trace;
          var total = trace.totalMs;
          var ticks = [0, 0.25, 0.5, 0.75, 1].map(function (f) { return Math.round(total * f); });

          return h('div', { class: 'ns-waterfall', role: 'listbox', 'aria-label': 'Trace spans' }, [
            h('div', { key: 'axis', class: 'ns-waterfall__axis' }, [
              h('div', { key: 'spacer' }),
              h('div', { key: 'track', class: 'ns-waterfall__axis-track' }, ticks.map(function (tick, i) {
                var pct = total === 0 ? 0 : (tick / total) * 100;
                return h('span', {
                  key: i,
                  class: 'ns-waterfall__tick',
                  style: i === ticks.length - 1
                    ? { left: pct + '%', transform: 'translateX(-100%)' }
                    : { left: pct + '%' },
                }, fmtMs(tick));
              })),
            ]),
          ].concat(trace.spans.map(function (span) {
            var startPct = (span.start / total) * 100;
            var widthPct = Math.max((span.dur / total) * 100, 0.4);
            var endPct = startPct + widthPct;
            var durStyle = endPct > 80
              ? { right: (100 - startPct) + '%', paddingLeft: 0, paddingRight: 'var(--ns-space-1-5)' }
              : { left: endPct + '%' };
            var selected = props.selectedId === span.id;
            return h('button', {
              key: span.id,
              type: 'button',
              role: 'option',
              class: 'ns-waterfall__row',
              'data-depth': String(span.depth),
              'data-state': span.status,
              'aria-selected': selected ? 'true' : 'false',
              onClick: function () { props.onSelect(span.id); },
            }, [
              h('span', { key: 'label', class: 'ns-waterfall__label' }, [
                h('span', {
                  key: 'dot',
                  class: 'ns-waterfall__dot',
                  'aria-hidden': 'true',
                  style: { background: barColor(span) },
                }),
                h('span', { key: 'name' }, span.name),
              ]),
              h('span', { key: 'track', class: 'ns-waterfall__track' }, [
                h('span', {
                  key: 'bar',
                  class: 'ns-waterfall__bar',
                  style: { left: startPct + '%', width: widthPct + '%', background: barColor(span) },
                }),
                h('span', { key: 'dur', class: 'ns-waterfall__duration', style: durStyle }, fmtMs(span.dur)),
              ]),
            ]);
          })));
        }

        function Legend(props) {
          var seen = [];
          props.trace.spans.forEach(function (s) {
            if (seen.indexOf(s.service) < 0) seen.push(s.service);
          });
          return h('div', { class: 'ns-cluster ns-cluster--sm' }, seen.map(function (svc) {
            return h('span', { key: svc, class: 'ns-connector__row' }, [
              h('span', { key: 'd', class: 'ns-waterfall__dot', 'aria-hidden': 'true', style: { background: SERVICE_COLOR[svc] } }),
              h('span', { key: 'n', class: 'ns-connector__probe' }, svc),
            ]);
          }));
        }

        /* ---------- span detail rail ---------- */

        function SpanDetail(props) {
          var span = props.span;
          if (!span) {
            return h(NS.EmptyState, { heading: 'No span selected' },
              'Select a span to inspect timing, attributes, and events.');
          }
          var body = [
            h('div', { key: 'timing', class: 'ns-stack ns-stack--xs' }, [
              h('p', { key: 'l', class: 'ns-label' }, 'Timing'),
              h('div', { key: 'v', class: 'ns-connector' }, [
                h('span', { key: 'start', class: 'ns-connector__row' }, [
                  h('span', { key: 'p', class: 'ns-connector__probe' }, 'start'),
                  h('span', { key: 'r', class: 'ns-connector__result' }, '+' + span.start + ' ms'),
                ]),
                h('span', { key: 'dur', class: 'ns-connector__row' }, [
                  h('span', { key: 'p', class: 'ns-connector__probe' }, 'duration'),
                  h('span', { key: 'r', class: 'ns-connector__result' }, fmtMs(span.dur)),
                ]),
              ]),
            ]),
            h('div', { key: 'attrs', class: 'ns-stack ns-stack--xs' }, [
              h('p', { key: 'l', class: 'ns-label' }, 'Attributes'),
              h(NS.CodeBlock, { key: 'v', code: JSON.stringify(span.attrs || {}, null, 2), lang: 'json' }),
            ]),
          ];
          if (span.events) {
            body.push(h('div', { key: 'events', class: 'ns-stack ns-stack--xs' }, [
              h('p', { key: 'l', class: 'ns-label' }, 'Events'),
              h('div', { key: 'v', class: 'ns-activity-feed' }, span.events.map(function (ev, i) {
                var tone = /fail|refused|ECONN/.test(ev[1])
                  ? 'destructive'
                  : /retry/.test(ev[1]) ? 'warning' : /completed/.test(ev[1]) ? 'success' : 'primary';
                return h('div', { key: i, class: 'ns-activity-feed__item', 'data-tone': tone }, [
                  h('span', { key: 'm', class: 'ns-activity-feed__marker', 'aria-hidden': 'true' }),
                  h('div', { key: 'b', class: 'ns-activity-feed__body' }, [
                    h('p', { key: 't', class: 'ns-activity-feed__text' }, ev[1]),
                    h('p', { key: 'ts', class: 'ns-activity-feed__time' }, ev[0]),
                  ]),
                ]);
              })),
            ]));
          }
          var footer = [];
          if (span.run) {
            footer.push(h(NS.Button, { key: 'run', variant: 'ghost', size: 'sm' }, 'Open in Run Inspector'));
          }
          return h(NS.Panel, { tone: 'raised' }, [
            h(NS.Panel.Header, { key: 'head' }, [
              h(NS.Panel.Title, { key: 't' }, span.name),
              h('div', { key: 'b', class: 'ns-cluster ns-cluster--sm' }, [
                h(NS.Badge, { key: 'svc', variant: 'muted' }, span.service),
                h(R.Fragment, { key: 'st' }, StatusBadge(span.status)),
              ]),
            ]),
            h(NS.Panel.Body, { key: 'body', class: 'ns-stack ns-stack--md' }, body),
          ].concat(footer.length
            ? [h(NS.Panel.Footer, { key: 'foot', class: 'ns-cluster ns-cluster--sm' }, footer)]
            : []));
        }

        /* ---------- log strip ---------- */

        function LogStrip(props) {
          return h('div', { class: 'ns-log-stream', 'data-state': 'following' }, [
            h('div', { key: 'bar', class: 'ns-log-stream__toolbar' }, [

              h('span', { key: 'sp', style: { flex: '1' } }),
              h(NS.Switch, { key: 'follow', defaultChecked: true }, 'Follow'),
            ]),
            h('div', { key: 'lines', class: 'ns-log-stream__lines' }, props.logs.map(function (line, i) {
              return h('div', { key: i, class: 'ns-log-stream__line', 'data-severity': line[2] }, [
                h('span', { key: 'ts', class: 'ns-log-stream__ts' }, line[0]),
                h('span', { key: 'res', class: 'ns-log-stream__resource' }, line[1]),
                h('span', { key: 'sev', class: 'ns-log-stream__severity' }, line[2]),
                h('span', { key: 'msg', class: 'ns-log-stream__msg' }, line[3]),
              ]);
            })),
          ]);
        }

        /* ---------- trace list ---------- */

        function TraceList(props) {
          return h(NS.Panel, { tone: 'muted' }, [
            h(NS.Panel.Header, { key: 'head' }, [
              h(NS.Panel.Title, { key: 't' }, 'Traces'),

            h(NS.Panel.Body, { key: 'body', class: 'ns-stack ns-stack--sm' }, [
              h(NS.Input, { key: 'q', placeholder: 'Filter traces', 'aria-label': 'Filter traces' }),
              h(NS.Select, {
                key: 'status',
                'aria-label': 'Status filter',
                options: [
                  { value: 'all', label: 'All statuses' },
                  { value: 'completed', label: 'completed' },
                  { value: 'failed', label: 'failed' },
                  { value: 'retrying', label: 'retrying' },

                defaultValue: 'all',

              h('div', { key: 'list', class: 'ns-entity-rail', role: 'listbox', 'aria-label': 'Recent traces' },
                TRACES.map(function (t) {
                  return h('button', {
                    key: t.id,
                    type: 'button',
                    role: 'option',
                    class: 'ns-entity-rail__item',
                    'data-state': props.selectedId === t.id ? 'selected' : undefined,
                    'aria-selected': props.selectedId === t.id ? 'true' : 'false',
                    onClick: function () { props.onSelect(t.id); },
                  }, [
                    h('span', { key: 't', class: 'ns-entity-rail__title' }, [
                      h('span', { key: 'n' }, t.title),
                      h(R.Fragment, { key: 'b' }, StatusBadge(t.status)),
                    ]),
                    h('span', { key: 'm', class: 'ns-entity-rail__meta' }, t.meta),
                  ]);
                })),
            ]),
          ]);
        }

        /* ---------- page ---------- */

        function Page() {
          var traceSt = R.useState('t1');
          var traceId = traceSt[0], setTraceId = traceSt[1];
          var trace = TRACES[0];
          TRACES.forEach(function (t) { if (t.id === traceId) trace = t; });

          var spanSt = R.useState(trace.defaultSpan);
          var spanId = spanSt[0], setSpanId = spanSt[1];
          var span = null;
          trace.spans.forEach(function (s) { if (s.id === spanId) span = s; });

          function selectTrace(id) {
            setTraceId(id);
            var next = null;
            TRACES.forEach(function (t) { if (t.id === id) next = t; });
            if (next) setSpanId(next.defaultSpan);
          }

          return h(Shell, null, h('div', { class: 'ns-stack ns-stack--lg' }, [
            h(NS.PageHeader, { key: 'header', class: 'ns-page-header--console' },
              h(NS.PageHeader.Main, null, [
                h(NS.PageHeader.Intro, { key: 'intro' }, [
                  h('h1', { key: 'h' }, 'Traces'),
                  h('p', { key: 'p', class: 'ns-lede' },
                    'Cross-service flow for every request, job, firing, and delivery. One trace id ties the waterfall, span detail, and logs together.'),
                ]),
                h(NS.PageHeader.Status, { key: 'status' }, [
                  h('span', { key: '1' }, '6 traces in the last 5 min'),
                  h('span', { key: 's1', class: 'ns-status-bar__sep' }, '·'),
                  h('span', { key: '2' }, '1 failed'),
                  h('span', { key: 's2', class: 'ns-status-bar__sep' }, '·'),
                  h('span', { key: '3' }, '1 retrying'),
                ]),
              ]),
            ),
            h('div', { key: 'body', class: 'ns-rail-grid' }, [
              h(TraceList, { key: 'list', selectedId: traceId, onSelect: selectTrace }),
              h('div', { key: 'main', class: 'ns-content-rail' }, [
                h('div', { key: 'wf', class: 'ns-stack ns-stack--md' }, [
                  h(NS.Card, { key: 'card' }, [
                    h(NS.Card.Header, { key: 'head' }, [
                      h('div', { key: 'title', class: 'ns-stack ns-stack--xs' }, [
                        h(NS.Card.Title, { key: 't' }, trace.title),
                        h(NS.Card.Description, { key: 'd' }, trace.meta),
                      ]),
                      h(Legend, { key: 'legend', trace: trace }),
                    ]),
                    h(NS.Card.Body, { key: 'body' },
                      h(Waterfall, { trace: trace, selectedId: spanId, onSelect: setSpanId })),
                  ]),
                  h(LogStrip, { key: 'logs', logs: trace.logs }),
                ]),
                h('div', { key: 'rail' }, h(SpanDetail, { span: span })),
              ]),
            ]),
          ]));
        }

        ReactDOM.createRoot(document.getElementById('root')).render(h(Page));
      })();
    </script>
  </body>
</html>
